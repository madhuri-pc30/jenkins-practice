name: Playwright Tests

on:
  schedule:
    - cron: "0 13 * * *" # Runs every day at 8:00 AM EST
  workflow_dispatch: # Allows manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # Virtual machine (macos-latest, windows-latest, ubuntu-latest)

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright Chromium (replace with other browsers if needed)
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Run tests in headless mode
      - name: Run Playwright tests
        run: npm run tests:headless

      # Upload test results and reports
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
