name: Playwright Tests

on:
  push: # Trigger on push to main or master branches
    branches:
      - main
      - master
  pull_request: # Trigger on PRs to main or master
    branches:
      - main
      - master
  schedule:
    - cron: "0 13 * * *" # Runs daily at 8:00 AM EST
  workflow_dispatch: # Manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # Options: macos-latest, windows-latest, ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        # Installs Chromium (change to 'firefox' or 'webkit' if needed, or remove to install all)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (headless)
        run: npm run tests:headless

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
